<html>
    <head>
        <style>
            #box{
                height: 300px;
                width: 300px;
                background-color: #04AC10;
                transition: 1s;
                border-radius: 30px;
            }
            #box:hover{
                box-shadow: 20px 20px 30px #000;
                cursor: pointer;
                /*          R/L   B/T  blur  color  */
            }

            h1{
                font-size: 50px;
                transition: .5s;
                text-shadow: 3px 3px 5px #000;
                color: #fff;

            }
            h1:hover{
                text-shadow: 5px 5px 15px blue;
            }

        </style>
    </head>
    <body>
        <!--  -->
        <div id="box"></div>
        <br />
        <br />
        <h1>The Stepping Stone</h1>
        
    </body>
</html>
