<!-- 
    when we want collect some data from user then we can use <form> tag
    inside of <form> tag, there are 11 tag....
        
        1. Textbox

        2. Password

        3. Radio button

        4. checkbox

        5. textarea

        6. select - option

        7. file

        8. button

        9. reset

        10. Submit

        11. hidden

 -->

<html>
    <head>

    </head>
    <body>
        <h1>Form in HTML</h1>
        <form>
            <img src="1.jpg" height="200" width="200"/>
            <Br />
            <input type="hidden" />

            Full Name <input type="text"/>
            <br />
            <br />
            Age <input type="text" />
            <br />
            <br />
            Password <input type="password" />
            <br />
            <br />
            Gender : <input type="radio" name="gender"/>Male
                    <input type="radio" name="gender"/>Female
            <br />
            <br />
            Language : <input type="checkbox" />Hindi
                        <input type="checkbox" />English
                        <input type="checkbox" />Gugrati
                        <input type="checkbox" />Marathi

            <br />
            <br />
            Address : <textarea rows="5" cols="30"></textarea>
            <!-- default rows is 2 and cols is 25 -->
            <br />
            <br />
            City : <select>
                        <option>Indore</option>
                        <option>Mumbai</option>
                        <option>Pune</option>
                        <option>Delhi</option>
                    </select>
            <br />
            <br />
            Select Image : <input type="file" />
            <br />
            <br />
            <input type="button" value="OK"/>
            <input type="reset" value="Reset" />
            <input type="submit" value="Add User" />
            <br />
            <br />
            <br />
            <br />
        </form>
    </body>
</html>
