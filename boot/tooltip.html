<html>
    <head>
        <link type="text/css" rel="stylesheet" href="css/bootstrap.css" />
        <link type="text/css" rel="stylesheet" href="css/font-awesome.css" />

        <script src="js/jquery.js"></script>
        <script src="js/bootstrap.bundle.js"></script>
        <meta name="viewport" content="width=device-width, initital-scale=1" />
        <script>
            $(document).ready(function(){
                $('[data-toggle="tooltip"]').tooltip();
            })
            
        </script>
    </head>
    <body>
        <div class="container mt-5">
            <div class="row">
                <div class="col-md-12">
                    <h2>Tooltip in Bootstrap</h2>
                    <button data-placement="right" data-toggle="tooltip" title="Lorem ipsum dolor sit amet consectetur adipisicing elit. Recusandae sequi voluptates quidem quas officiis ut error sapiente, debitis aut laboriosam repellendus tenetur obcaecati, fuga nobis beatae, qui nam aliquid cum." class="btn btn-primary">?</button>
                    
                </div>
            </div>
        </div>
    </body>

</html>
